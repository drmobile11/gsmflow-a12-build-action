name: Build Secure Executable

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: 'x64'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install cryptography ordered-set
        
    - name: Build with Nuitka (Maximum Security)
      shell: pwsh
      run: |
        # Install Nuitka directly for better control
        pip install nuitka --upgrade
        
        # Build with verbose progress output
        python -m nuitka \
          --mode=standalone \
          --deployment \
          --python-flag=no_site \
          --enable-plugin=pyqt5 \
          --follow-imports \
          --include-package=PyQt5 \
          --include-package=pymobiledevice3 \
          --include-package=requests \
          --include-package=urllib3 \
          --include-package=certifi \
          --include-package=chardet \
          --include-package=idna \
          --include-package=cryptography \
          --include-plugin-directory=core \
          --include-plugin-directory=gui \
          --include-plugin-directory=security \
          --include-plugin-directory=utils \
          --include-data-dir=libs=libs \
          --windows-console-mode=disable \
          --no-deployment-flag=self-execution \
          --output-dir=build/nuitka_secure \
          --user-package-configuration-file=nuitka.ini \
          --verbose \
          --progress \
          main.py
        
        # Move files from main.dist to output folder (Nuitka creates main.dist in standalone mode)
        if (Test-Path "build/nuitka_secure/main.dist") {
            Copy-Item -Path "build/nuitka_secure/main.dist/*" -Destination "build/nuitka_secure/" -Recurse -Force
            Remove-Item -Path "build/nuitka_secure/main.dist" -Recurse -Force
        }
        
        # List output files for debugging
        Write-Host "Output files:"
        Get-ChildItem "build/nuitka_secure" | Select-Object Name, Length
        
        # Check if main.exe exists
        if (Test-Path "build/nuitka_secure/main.exe") {
            Write-Host "✅ main.exe found!"
        } else {
            Write-Host "❌ main.exe NOT found!"
            Get-ChildItem "build/nuitka_secure" -Recurse | ForEach-Object { Write-Host $_.FullName }
        }
        
    - name: Generate SHA256 hash
      run: |
        if (Test-Path "build/nuitka_secure/main.exe") {
            $hash = Get-FileHash "build/nuitka_secure/main.exe" -Algorithm SHA256
            $hash.Hash | Out-File "build/nuitka_secure/main.exe.sha256"
            Write-Host "SHA256: $($hash.Hash)"
        } else {
            Write-Host "Skipping hash - main.exe not found"
        }
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: A12Bypass-Secure-Windows-${{ github.sha }}
        path: |
          build/nuitka_secure/*
          !build/nuitka_secure/.session_key
        retention-days: 30
        include-hidden-files: true
        
    - name: Create release archive
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        if (Test-Path "build/nuitka_secure/main.exe") {
            Compress-Archive -Path "build/nuitka_secure/*" -DestinationPath "A12Bypass-Secure.zip" -Force
            Write-Host "✅ Release archive created"
        } else {
            Write-Host "Skipping release - build failed"
        }
        
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: A12Bypass-Secure.zip
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
